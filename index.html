<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Check the Company</title>
    <style>
        body { font-family: Arial, sans-serif; background-color: #f4f4f4; color: #333; padding: 20px; }
        h1 { color: #4CAF50; }
        ul { list-style-type: none; padding: 0; }
        li { padding: 10px; background: #fff; margin-bottom: 10px; border-radius: 4px; }
    </style>
</head>
<body>
    <h1>Company Data</h1>
    <div id="company-info"></div>
    <script>
        const companies = [
            { name: "Tech Solutions", location: "New York, NY", revenue: "$5M" },
            { name: "Innovatech", location: "San Francisco, CA", revenue: "$10M" },
            { name: "Future Corp", location: "Austin, TX", revenue: "$2M" }
        ];

        const companyInfoDiv = document.getElementById('company-info');
        const ul = document.createElement('ul');

        companies.forEach(company => {
            const li = document.createElement('li');
            li.innerText = `${company.name} - Location: ${company.location}, Revenue: ${company.revenue}`;
            ul.appendChild(li);
        });

        companyInfoDiv.appendChild(ul);
    </script>
</body>
</html>
