            padding: 0;

        }

            color: black;
        }

        header {

            top: 0;

        }

        header h1 {

            margin-bottom: 15px;
            color: black;
        }

            margin-top: 10px;
        }

            padding: 12px;
            font-size: 16px;
            border: 2px solid black;
            border-radius: 4px;
            background-color: white;
            color: black;
        }

        .search-container button {
            padding: 12px 40px;
            background-color: white;
            color: black;
            border: 2px solid black;
            font-size: 16px;
            cursor: pointer;
            border-radius: 4px;
            font-weight: bold;
        }

        .search-container button:hover {
            background-color: #f5f5f5;
        }

        .loading {
            text-align: center;
            padding: 40px;
            font-size: 18px;
            color: black;
            display: none;
        }

        .loading.active {
            display: block;
        }

        .main-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            padding: 20px;
            min-height: 100vh;
            display: none;
        }

        .main-grid.active {
            display: grid;
        }

        .quadrant {
            border: 2px solid black;
            padding: 20px;
            overflow-y: auto;
            max-height: 50vh;
            background-color: white;
        }

        .quadrant h2 {
            font-size: 18px;
            margin-bottom: 15px;
            border-bottom: 2px solid black;
            padding-bottom: 10px;
            color: black;
        }

        .quadrant h3 {
            font-size: 16px;
            margin-bottom: 10px;
            border-bottom: 2px solid black;
            padding-bottom: 5px;
            color: black;
        }

        /* Quadrant 2 - Top Left */
        .quadrant-2 {
            grid-column: 1;
            grid-row: 1;
        }

        .company-image {
            width: 100%;
            height: 200px;
            border: 2px solid black;
            margin: 15px 0;
            background-color: #f5f5f5;
            display: flex;
            align-items: center;
            justify-content: center;
            color: gray;
            font-size: 14px;
            text-align: center;
            padding: 10px;
        }

        .company-image img {
            max-width: 100%;
            max-height: 100%;
            object-fit: contain;
        }

        .short-profile {
            background-color: white;
            padding: 15px;
            border: 1px solid black;
            margin-top: 15px;
            line-height: 1.6;
            color: black;
        }

        .quadrant-1 {
            grid-column: 2;
            grid-row: 1;
            display: flex;
            flex-direction: column;
        }

        .rating-section {
            padding: 15px;
            border: 1px solid black;
            margin-bottom: 20px;
            background-color: white;
        }

        .stars {
            font-size: 28px;
            color: #FFD700;
            margin: 10px 0;
        }

        .rating-info {
            margin-top: 10px;
            font-size: 14px;
            color: black;
        }

        .strongest-areas {
            padding: 15px;
            border: 1px solid black;
            margin-bottom: 20px;
            background-color: white;
        }

        .areas-list {
            list-style: none;
            margin-left: 10px;
            color: black;
        }

        .areas-list li {
            margin: 8px 0;
            padding-left: 15px;
            position: relative;
        }

        .areas-list li:before {
            content: "•";
            position: absolute;
            left: 0;
            font-weight: bold;
            color: black;
        }

        .locations-section {
            padding: 15px;
            border: 1px solid black;
            background-color: white;
        }

        .location-item {
            margin: 10px 0;
            padding-left: 15px;
            border-left: 3px solid black;
            color: black;
        }

        .location-item strong {
            color: black;
        }

        .bottom-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            padding: 20px;
            padding-top: 0;
            min-height: 100vh;
            display: none;
        }

        .bottom-grid.active {
            display: grid;
        }

            border: 2px solid black;
            padding: 20px;
            overflow-y: auto;
            max-height: 50vh;
            background-color: white;
        }

            width: 100%;
            border-collapse: collapse;
            margin-top: 10px;
        }

        th, td {
            border: 1px solid black;
            padding: 12px;
            text-align: left;
            color: black;
            background-color: white;
        }

        th {
            font-weight: bold;
            border-bottom: 2px solid black;
        }

        tr:nth-child(even) {
            background-color: #f9f9f9;
        }

        .error-message {
            background-color: #ffe6e6;
            border: 2px solid #cc0000;
            color: #660000;
            padding: 15px;
            margin: 15px auto;
            border-radius: 4px;
            width: 90%;
            max-width: 600px;
            text-align: center;
            display: none;
        }

        .error-message.active {
            display: block;
        }

        .success-message {
            background-color: #e6ffe6;
            border: 2px solid #00cc00;
            color: #006600;
            padding: 15px;
            margin: 15px auto;
            border-radius: 4px;
            width: 90%;
            max-width: 600px;
            text-align: center;
            display: none;
        }

        .success-message.active {
            display: block;
        }

        @media (max-width: 1200px) {
            .main-grid {
                grid-template-columns: 1fr;
            }

            .quadrant-1 {
                grid-column: 1;
            }

            .bottom-grid {
                grid-template-columns: 1fr;
            }
        }

        .no-data {
            text-align: center;
            color: #999;
            font-style: italic;
            padding: 20px;
        }

</head>

                    { q: 'How do you approach innovation and problem-solving?', a: 'Innovation requires questioning assumptions, experimenting with new ideas, learning from failures, and collaborating with diverse perspectives.' },
                    { q: 'Describe your experience with autonomous systems.', a: 'I\'ve worked on autonomous systems projects, understanding computer vision, sensor fusion, machine learning, and safety-critical systems.' },
                    { q: 'How do you handle working in a fast-paced, challenging environment?', a: 'I thrive in fast-paced environments. I stay focused on priorities, adapt quickly, collaborate intensely, and remain motivated by the mission.' },
                    { q: 'Tell us about your manufacturing or production experience.', a: 'I understand manufacturing processes, quality control, scaling production challenges, and Tesla\'s innovative approach to manufacturing efficiency.' },
                    { q: 'How do you approach sustainability?', a: 'Sustainability is core to Tesla\'s mission. I actively consider environmental impact in design decisions and support the goal of reducing carbon emissions.' },
                    { q: 'Tell us about a complex technical challenge you solved.', a: 'I debugged a complex issue in [system] by systematically testing components, analyzing data, and collaborating with cross-functional teams.' },
                    { q: 'How do you stay motivated in a challenging role?', a: 'I stay motivated by remembering the impact of my work. Knowing that my contributions help accelerate sustainable energy keeps me energized.' },
                    { q: 'What excites you about the future of electric vehicles?', a: 'The EV revolution is transformative. Improvements in battery technology, charging infrastructure, and autonomous driving will completely change transportation.' }
                ]
            }
        };

        function searchCompany() {
            const companyName = document.getElementById('company-input').value.toLowerCase().trim();

            if (!companyName) {
                showError('Please enter a company name');
                return;
            }

            const company = companyDatabase[companyName];

            if (!company) {
                showError(`Company "${companyName}" not found. Try: DHL, Google, Apple, Microsoft, Amazon, Netflix, or Tesla`);
                return;
            }

            showLoading(true);
            setTimeout(() => {
                displayCompany(company);
                showLoading(false);
                showSuccess(`✅ Loaded ${company.name}`);
            }, 500);
        }

        function displayCompany(company) {
            // Display profile
            document.getElementById('short-profile-text').textContent = company.description;
            
            // Display image
            const imageContainer = document.getElementById('company-image');
            if (company.image) {
                imageContainer.innerHTML = `<img src="${company.image}" alt="${company.name}" onerror="this.parentElement.textContent='Image not available'">`;
            } else {
                imageContainer.textContent = 'No image available';
            }

            // Display rating
            const filledStars = Math.round(company.rating);
            const emptyStars = 5 - filledStars;
            let starsHTML = '⭐'.repeat(filledStars) + '☆'.repeat(emptyStars);

            document.getElementById('rating-content').innerHTML = `
                <div class="stars">${starsHTML}</div>
                <div class="rating-info"><strong>${company.rating}</strong> out of 5<br>Based on <strong>${company.reviews}</strong> reviews</div>
            `;

            // Display strongest areas
            const areasList = document.getElementById('strongest-areas-list');
            areasList.innerHTML = company.strongestAreas.map(area => `<li>${area}</li>`).join('');

            // Display locations
            const locationsDiv = document.getElementById('locations-content');
            locationsDiv.innerHTML = company.locations.map((loc, i) => {
                if (i === 0) return `<div class="location-item"><strong>🏛️ Headquarters:</strong><br>${loc}</div>`;
                return `<div class="location-item"><strong>📍 Location ${i}:</strong><br>${loc}</div>`;
            }).join('');

            // Display interview questions and answers
            const questionsTable = document.getElementById('questions-table');
            const answersTable = document.getElementById('answers-table');
            questionsTable.innerHTML = '<tr><th>Question</th></tr>';
            answersTable.innerHTML = '<tr><th>Suggested Answer</th></tr>';

            company.interviewQuestions.forEach((item, i) => {
                questionsTable.innerHTML += `<tr><td>${i + 1}. ${item.q}</td></tr>`;
                answersTable.innerHTML += `<tr><td>${item.a}</td></tr>`;
            });

            // Show all sections
            document.getElementById('main-grid').classList.add('active');
            document.getElementById('bottom-grid').classList.add('active');
        }

        function showLoading(show) {
            document.getElementById('loading').classList.toggle('active', show);
        }

        function showError(message) {
            const errorDiv = document.getElementById('error-message');
            errorDiv.textContent = '❌ ' + message;
            errorDiv.classList.add('active');
            setTimeout(() => errorDiv.classList.remove('active'), 4000);
        }

        function showSuccess(message) {
            const successDiv = document.getElementById('success-message');
            successDiv.textContent = message;
            successDiv.classList.add('active');
            setTimeout(() => successDiv.classList.remove('active'), 3000);
        }

        // Enter key support
        document.getElementById('company-input').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') searchCompany();
        });
    </script>
</body>
</html>
